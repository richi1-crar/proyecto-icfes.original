<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Niveles Interactivos</title>
<style>
  :root {
    --bg1: #0b2030; --panel: #0f2a3a; --wood: #6b3f1f; --paper: #f6efdf; 
    --accent: #0ea5a8; --glass: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(800px 400px at 10% 10%, rgba(14,144,156,0.06), transparent),
                linear-gradient(180deg, #072733 0%, #07101a 60%);
    font-family: Inter, system-ui, Segoe UI, Arial;
    color: #eaf6ff;
    padding: 18px;
  }
  .wrap { width: 100%; max-width: 1100px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  h1 { font-size: 22px; letter-spacing: 0.4px; }
  .meta { font-size: 13px; color: #cfe8ee; opacity: .95; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    padding: 18px;
    border-radius: 14px;
    box-shadow: 0 18px 50px rgba(3,12,20,0.6);
  }
  .lvl {
    position: relative;
    padding: 18px;
    border-radius: 10px;
    background: linear-gradient(180deg, #3f2b1a, #52351f);
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .18s ease, box-shadow .18s;
    box-shadow: 0 8px 20px rgba(2,8,12,0.6);
    cursor: pointer;
  }
  .lvl:hover {
    transform: translateY(-6px);
    box-shadow: 0 8px 25px rgba(0,255,255,0.3);
  }
  .paper {
    width: 86%;
    height: 76%;
    background: linear-gradient(180deg, var(--paper), #f1e9d6);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: #3a2a1d;
    font-size: 26px;
    border: 3px solid rgba(0,0,0,0.06);
    box-shadow: inset 0 -8px 22px rgba(0,0,0,0.06);
  }
  .lvl .badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--glass);
    padding: 6px 8px;
    border-radius: 8px;
    font-size: 12px;
    color: #cfe8ee;
  }
  footer.small {
    margin-top: 12px;
    color: #bcdedf;
    text-align: center;
    font-size: 13px;
  }
  .btn-volver {
    background: transparent;
    border: none;
    cursor: pointer;
    position: absolute;
    top: 15px;
    left: 15px;
  }
  .btn-volver img {
    width: 36px;
    height: 36px;
  }
  @media (max-width:900px){ .grid{grid-template-columns:repeat(4,1fr)} .lvl{height:100px} }
  @media (max-width:640px){ .grid{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>

  <button class="btn-volver" onclick="window.location.href='index.html'" title="Volver al inicio">
    <img src="inicios.png" alt="Volver">
  </button>

  <div class="wrap">
    <header>
      <div>
        <h1>Busca una nueva forma de aprender</h1>
        <div class="meta">10 niveles · PROYECTO RETOIC</div>
      </div>
    </header>

    <main>
      <section class="grid" id="grid"></section>
    </main>

    <footer class="small">PROYECTO RETOIC</footer>
  </div>

<script>
  const grid = document.getElementById('grid');


  const rutas = [
    
    "nivel2.html",
    "nivel.3.html",
    "nivel9.html",
   
  ];

  rutas.forEach((ruta, i) => {
    const el = document.createElement('div');
    el.className = 'lvl';
    el.innerHTML = `
      <div class="badge">Nivel</div>
      <div class="paper">${i + 1}</div>
    `;
    el.addEventListener('click', () => {
      window.location.href = ruta;
    });
    grid.appendChild(el);
  });
</script>

</body>
</html>
