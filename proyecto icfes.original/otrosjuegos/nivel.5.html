<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardianes del Lenguaje</title>
  <link rel="stylesheet" href="estilo5.css">
</head>
<body>

  <div id="startScreen" class="screen">
    <h1>📚 Guardianes del Lenguaje</h1>
    <p>¡Salva la Biblioteca del Cosmos!</p>
    <button class="btn" id="startBtn">🚀 Comenzar</button>
  </div>

  <div id="level1" class="screen hidden">
    <h2>Nivel 1: Figuras Literarias</h2>
    <p><em>"Tus ojos son el mar."</em></p>
    <p>¿Qué figura literaria se usa?</p>
    <div class="options">
      <button class="btn option" data-answer="A">A. Hipérbole</button>
      <button class="btn option" data-answer="B">B. Metáfora</button>
      <button class="btn option" data-answer="C">C. Personificación</button>
    </div>
    <p id="feedback"></p>
    <button class="btn hidden" id="nextBtn">Siguiente Nivel</button>
  </div>

  <audio id="soundCorrect" src="sounds/correct.mp3"></audio>
  <audio id="soundWrong" src="sounds/wrong.mp3"></audio>

  <script src="script.js.5.js"></script>
</body>
</html>
