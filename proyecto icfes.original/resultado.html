<body>


<h1>Resultados del Juego</h1>

<table>
  <thead>
    <tr>
      <th>Pregunta</th>
      <th>Tu respuesta</th>
      <th>Respuesta correcta</th>
      <th>Resultado</th>
    </tr>
  </thead>
  <tbody id="tabla-resultados"></tbody>
</table>

<h2 id="puntaje">Tu puntaje: 0/0 (0%)</h2>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const tablaResultados = document.getElementById("tabla-resultados");
    const puntajeTexto = document.getElementById("puntaje");

    const resultados = JSON.parse(localStorage.getItem("resultadosJuego") || "[]");

    let correctas = 0;

    resultados.forEach((item) => {
      const fila = document.createElement("tr");

      fila.innerHTML = `
        <td>${item.pregunta}</td>
        <td>${item.respuestaUsuario.toUpperCase()}</td>
        <td>${item.respuestaCorrecta.toUpperCase()}</td>
        <td style="text-align: center">${item.esCorrecta ? "✅" : "❌"}</td>
      `;

      if (item.esCorrecta) correctas++;

      tablaResultados.appendChild(fila);
    });

    const total = resultados.length;
    const porcentaje = total > 0 ? ((correctas / total) * 100).toFixed(2) : 0;

    puntajeTexto.textContent = `Tu puntaje: ${correctas}/${total} (${porcentaje}%)`;
  });

  // 🔁 Nueva versión: borra y redirige al inicio
  function borrarResultados() {
    localStorage.removeItem("resultadosJuego");
    alert("Los resultados han sido eliminados. Volverás al inicio para jugar otra vez.");
    window.location.href = "index.html"; // Cambia por tu página inicial o juego
  }
</script>

<button onclick="borrarResultados()">Borrar resultados</button>
