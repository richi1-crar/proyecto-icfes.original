<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - Socio Ocupacional</title>
  <link rel="stylesheet" href="contacto.css">
</head>
<body>
  <div class="overlay">
    <img src="img/SOCIO OCUPACIONAL.jpg" alt="Logo Socio Ocupacional" class="logo">
    <h1>Contáctanos</h1>
    <p>¿Tienes dudas, sugerencias o necesitas ayuda? Escríbenos:</p>
    <form>
      <input type="text" placeholder="Tu nombre" required><br>
      <input type="email" placeholder="Tu correo" required><br>
      <textarea placeholder="Escribe tu mensaje..." rows="5" required></textarea><br>
      <button type="submit">Enviar</button>
    </form>
    <a class="button" href="index.html">Volver al Inicio</a>
  </div>
  <footer>© 2025 Socio Ocupacional</footer>
</body>
</html>
